<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- <link rel="icon" href="./assets/favicon.ico"> -->
    <title>Event</title>
    <!-- 字體 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@100..900&display=swap" rel="stylesheet">

    <!-- 共用樣式 -->
    <link rel="stylesheet" href="./assets/css/style.css">
  </head>
  <body>
    <div class="container">
      <!-- header -->
      <div class="header">
        <img class="logo-1" src="./assets/images/logo-1.png" alt="logo">
        <img class="logo-2" src="./assets/images/logo-2.png" alt="logo">
      </div>

      <!-- loading -->
      <main class="main" id="loadingScreen">
        <div class="loading-container">
          <span class="loading-text">LOADING...</span>
          <div class="progress-container">
            <div class="progress-bar">
              <div class="progress-fill" id="progressFill"></div>
            </div>
          </div>
        </div>
      </main>

      <!-- content -->
      <main class="main" id="mainContent" style="display: none;">
        <div class="event-title">夢工場集章卡</div>
        <div class="event-text">集滿以下4枚印章，即可前往攤位服務臺兌換精美好禮1份！每人限兌換1次，數量有限，送完為止！</div>
        <div class="event-container">
          <div class="event-item event-item-1" onclick="goToEvent(1)">
            <img src="./assets/images/event-1.png" alt="event">
          </div>
          <div class="event-item event-item-2" onclick="goToEvent(2)">
            <img src="./assets/images/event-2.png" alt="event">
          </div>
          <div class="event-item event-item-3" onclick="goToEvent(3)">
            <img src="./assets/images/event-3.png" alt="event">
          </div>
          <div class="event-item event-item-4" onclick="goToEvent(4)">
            <img src="./assets/images/event-4.png" alt="event">
          </div>
          <!-- 已領取 -->
          <img class="rewarded" id="rewardedImage" src="./assets/images/rewarded.svg" alt="" style="display: none;">
        </div>

        
      </main>


      <!-- footer -->
      <div class="footer">
        <div class="footer-buttons"  id="footer" style="display: none;">
          <!-- 使用說明 -->
          <img class="usage-button" src="./assets/images/usage.svg" alt="event" onclick="window.location.href='description.html'">

          <!-- 禮物按鈕（收集完成後顯示） -->
          <img class="gift-button" id="giftButton" src="./assets/images/gift.svg" alt="event" onclick="showRedeemPopup()" style="display: none;">

          <!-- 隱私權政策 -->
          <img class="privacy-button" src="./assets/images/privacy.svg" alt="event" onclick="window.location.href='privacy.html'">
        </div>
        <div class="footer-line"> </div>
      </div>

      <div class="cloud-bg">
        <img class="cloud-1" src="./assets/images/cloud-1.png" alt="cloud">
        <img class="cloud-2" src="./assets/images/cloud-2.png" alt="cloud">
        <img class="cloud-3" src="./assets/images/cloud-3.png" alt="cloud">
      </div>

    </div>

      <!-- 步驟1：完成問卷兌換獎品彈窗 -->
      <div class="popup-overlay" id="surveyPopup">
        <div class="popup-content">
          <button class="popup-close" onclick="closePopup()">×</button>
          <h2 class="popup-title">完成問卷兌換獎品</h2>
          <div class="popup-content-box">
            <p class="popup-message">恭喜集滿4枚印章，完成問卷後至服務臺，出示本畫面兌換獎品。</p>
          </div>
          <button class="popup-button" onclick="goToSurvey()">填寫問卷</button>
        </div>
      </div>

      <!-- 步驟2：問卷完成，前往服務臺彈窗 -->
      <div class="popup-overlay" id="arrivePopup">
        <div class="popup-content">
          <button class="popup-close" onclick="closePopup()">×</button>
          <h2 class="popup-title">兌換獎品</h2>
          <div class="popup-content-box">
            <p class="popup-message">感謝您完成問卷，<br>請前往服務臺領取獎品</p>
          </div>
          <button class="popup-button" onclick="showRedeemPasswordPopup()">抵達服務臺</button>
        </div>
      </div>

      <!-- 步驟3：服務人員輸入密碼彈窗 -->
      <div class="popup-overlay" id="redeemPopup">
        <div class="popup-content">
          <button class="popup-close" onclick="closePopup()">×</button>
          <h2 class="popup-title">兌換獎品</h2>
          <div class="popup-content-box">
            <p class="popup-message">恭喜集滿4枚印章，<br>請前往服務臺出示本畫面兌換獎品</p>
            <div class="popup-input-group">
              <div class="popup-label">請交由服務人員輸入密碼</div>
              <input class="popup-input" type="password" id="redeemPasswordInput" placeholder="請輸入密碼" autocomplete="off" inputmode="numeric">
              <p class="popup-error" id="redeemPasswordError" style="display: none;">密碼錯誤，請重新輸入</p>
            </div>
          </div>
          <button class="popup-button" id="redeemSubmitButton" onclick="goToRedeem()">兌換</button>
        </div>
      </div>

       <!-- 已兌換過彈窗 -->
       <div class="popup-overlay" id="redeemedPopup">
        <div class="popup-content">
          <button class="popup-close" onclick="closePopup()">×</button>
          <h2 class="popup-title">兌換獎品</h2>
          <div class="popup-content-box">
            <p class="popup-message">每支行動裝置只能體驗一次噢</p>
          </div>
           <button class="popup-button" onclick="closePopup()">OK</button>
        </div>
      </div>

    <script src="./assets/js/app.js"></script>
    <script>
      // ============================================================
      // 集章卡主畫面
      // 集章動作在關卡內頁（event-1~4）完成，本頁只負責呈現目前狀態
      // ============================================================

      // ---------- 兌換流程：完成問卷 → 抵達服務臺 → 服務人員輸入密碼 → 兌換完成 ----------
      function showRedeemPopup() {
        if (Progress.redeemed()) {
          Popup.show('redeemedPopup');
          return;
        }

        // 已填過問卷就直接進入前往服務臺步驟
        Popup.show(Progress.surveyDone() ? 'arrivePopup' : 'surveyPopup');
      }

      function goToSurvey() {
        window.location.href = 'survey.html';
      }

      // 顯示密碼輸入彈窗
      function showRedeemPasswordPopup() {
        Popup.show('redeemPopup');

        // 每次開啟都清空輸入與錯誤訊息
        var input = document.getElementById('redeemPasswordInput');
        var error = document.getElementById('redeemPasswordError');
        if (input) input.value = '';
        if (error) error.style.display = 'none';
      }

      // 驗證密碼並完成兌換
      function goToRedeem() {
        var input = document.getElementById('redeemPasswordInput');
        var error = document.getElementById('redeemPasswordError');
        var button = document.getElementById('redeemSubmitButton');
        var password = input ? input.value.trim() : '';

        // 驗證為非同步，先鎖住按鈕避免連點
        if (button) button.disabled = true;

        // 密碼與「一裝置一次」都由後端判定，前端只負責呈現結果
        Redeem.submit(password).then(function (result) {
          if (button) button.disabled = false;

          if (result.ok) {
            if (error) error.style.display = 'none';
            Popup.close();
            markAsRedeemed();
            return;
          }

          // 後端說這支裝置已兌換過：以後端為準，同步本機狀態
          if (result.error === 'already_redeemed') {
            Popup.close();
            markAsRedeemed();
            Popup.show('redeemedPopup');
            return;
          }

          showRedeemError(redeemErrorMessage(result.error));
        });
      }

      // 後端錯誤代碼 → 給現場人員看的訊息
      function redeemErrorMessage(code) {
        if (code === 'too_many_attempts') return '密碼錯誤次數過多，請稍候再試';
        if (code === 'network') return '連線失敗，請確認網路後再試一次';
        return '密碼錯誤，請重新輸入';
      }

      function showRedeemError(message) {
        var error = document.getElementById('redeemPasswordError');
        if (!error) return;

        error.textContent = message;
        error.style.display = 'block';
      }

      // 兌換完成，切換為已領取狀態
      // 兌獎人次由後端在驗證成功時記錄，這裡不再另外送統計
      function markAsRedeemed() {
        Progress.setRedeemed();

        var rewardedImage = document.getElementById('rewardedImage');
        if (rewardedImage) rewardedImage.style.display = 'block';
      }

      // ---------- 集章卡狀態呈現 ----------

      // 前往各關卡內頁
      function goToEvent(eventId) {
        // 已兌換過就不再進入關卡
        if (Progress.redeemed()) {
          Popup.show('redeemedPopup');
          return;
        }
        window.location.href = 'event-' + eventId + '.html';
      }

      // 依集章狀態把印章圖換成 -active
      function renderStamps() {
        Stamps.load().forEach(function (eventId) {
          var img = document.querySelector('.event-item-' + eventId + ' img');
          if (img) img.src = './assets/images/event-' + eventId + '-active.png';
        });
      }

      // 集滿才顯示禮物按鈕
      function renderGiftButton() {
        var giftButton = document.getElementById('giftButton');
        if (giftButton) giftButton.style.display = Stamps.isComplete() ? 'block' : 'none';
      }

      // 已兌換則顯示「已領取」
      function renderRewarded() {
        if (!Progress.redeemed()) return;

        var rewardedImage = document.getElementById('rewardedImage');
        if (rewardedImage) rewardedImage.style.display = 'block';
      }

      // 從問卷頁送出後返回，自動帶出「前往服務臺」彈窗
      function checkReturnFromSurvey() {
        var params = new URLSearchParams(window.location.search);
        if (params.get('survey') !== 'done' || Progress.redeemed()) return;

        Popup.show('arrivePopup');

        // 清掉 query，避免重新整理又跳出彈窗
        window.history.replaceState({}, '', window.location.pathname);
      }

      // ---------- Loading ----------
      function showMainContent() {
        var loadingScreen = document.getElementById('loadingScreen');
        var mainContent = document.getElementById('mainContent');
        var footer = document.getElementById('footer');

        if (loadingScreen) loadingScreen.style.display = 'none';
        if (mainContent) mainContent.style.display = 'flex';
        if (footer) footer.style.display = 'flex';

        checkReturnFromSurvey();
      }

      // 進度條動畫
      function animateProgress() {
        var progressFill = document.getElementById('progressFill');
        var progress = 0;

        return setInterval(function () {
          progress += Math.random() * 15 + 5; // 隨機增加 5-20%

          if (progress >= 100) {
            progress = 100;
            if (progressFill) progressFill.classList.add('completed');
          }

          if (progressFill) progressFill.style.width = progress + '%';
        }, 150);
      }

      document.addEventListener('DOMContentLoaded', function () {
        renderStamps();
        renderGiftButton();
        renderRewarded();

        var progressInterval = animateProgress();

        // 3 秒後結束 loading，切換到集章卡
        setTimeout(function () {
          clearInterval(progressInterval);

          var progressFill = document.getElementById('progressFill');
          if (progressFill) progressFill.style.width = '100%';

          setTimeout(showMainContent, 300);
        }, 3000);
      });
    </script>
  </body>
</html>

<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- <link rel="icon" href="./assets/favicon.ico"> -->
    <title>Event</title>
    <!-- 字體 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@100..900&display=swap" rel="stylesheet">

    <!-- 共用樣式 -->
    <link rel="stylesheet" href="./assets/css/style.css">

    <!-- 本頁樣式 -->
    <style>
      /* 以 .main 為定位基準（.main 底部距容器底部還有 24px 的 footer-line） */
      .back-button{
        position: absolute;
        bottom: 25px;
        left: calc(50% - 120px);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- header -->
      <div class="header">
        <img class="logo-1" src="./assets/images/logo-1.png" alt="logo">
        <img class="logo-2" src="./assets/images/logo-2.png" alt="logo">
      </div>

      <!-- Cookie 同意區塊 -->
      <div class="cookie-consent" id="cookieConsent" style="display: none;">
        <div class="cookie-content">
          <p class="cookie-text">
            為提升您的使用體驗，本網站使用Cookies分析技術。若繼續閱覽本網站內容，即表示您同意我們使用Cookies。關於更多Cookies資訊，請閱讀我們的<a href="privacy.html" class="cookie-link">隱私權政策</a>。
          </p>
          <div class="cookie-buttons">
            <button class="cookie-button cookie-button-disagree" onclick="handleCookieDisagree()">不同意</button>
            <button class="cookie-button cookie-button-accept" onclick="handleCookieAccept()">我接受</button>
          </div>
        </div>
      </div>

      <!-- content -->
      <!-- banner 為滿版，這裡不套 .page-main 的內距 -->
      <main class="main" id="mainContent">
        <img class="banner" src="./assets/images/banner.png" alt="">
        <button class="common-button back-button" onclick="startCollect()">開始蒐集</button>
      </main>

      <!-- footer -->
      <div class="footer">
        <div class="footer-line"> </div>
      </div>

    </div>

    <!-- 請先同意 Cookie 彈窗 -->
    <div class="popup-overlay" id="cookieWarningPopup">
      <div class="popup-content">
        <button class="popup-close" onclick="closePopup()">×</button>
        <h2 class="popup-title">提醒</h2>
        <div class="popup-content-box">
          <p class="popup-message">請先同意 Cookie 政策以繼續使用本網站功能。</p>
        </div>
        <button class="popup-button" onclick="closePopup()">OK</button>
      </div>
    </div>

    <!-- Cookie 同意、彈窗、橫向偵測皆由 app.js 處理 -->
    <script src="./assets/js/app.js"></script>
  </body>
</html>

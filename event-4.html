<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- <link rel="icon" href="./assets/favicon.ico"> -->
    <title>Event</title>
    <!-- 字體 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@100..900&display=swap" rel="stylesheet">

    <!-- 共用樣式 -->
    <link rel="stylesheet" href="./assets/css/style.css">
  </head>
  <body>
    <div class="container">
      <!-- header -->
      <div class="header">
        <img class="logo-1" src="./assets/images/logo-1.png" alt="logo">
        <img class="logo-2" src="./assets/images/logo-2.png" alt="logo">
      </div>

      <!-- content -->
      <main class="main event-main">
        <div class="event-detail">
          <div class="event-title" id="eventTitle"></div>
          <img class="event-detail-img" id="eventImage" src="./assets/images/event-4-collect.png" alt="event">
          <div class="event-detail-step">

            <div class="step-item">
              <div class="step-number">
                <div>任務1</div>
                <img src="./assets/images/angle.svg" alt="angle">
              </div>
              <div class="step-text">走訪人生100設計館，探索終身學習資源，完成「全齡教育尋寶圖」。</div>
            </div>
          </div>

          <!-- 尋寶圖表單：點擊後以全螢幕彈窗嵌入，不離開活動網站 -->
          <button class="common-button form-open-button" onclick="openTreasureForm()">開啟全齡教育尋寶圖</button>
        </div>
      </main>

      <!-- footer -->
      <div class="footer">
        <div class="footer-buttons" id="footer">
          <!-- 使用說明 -->
          <img class="usage-button" src="./assets/images/usage.svg" alt="event" onclick="window.location.href='description.html'">

          <!-- 掃描集章按鈕 -->
          <img class="scan-button" src="./assets/images/scan.svg" alt="scan" onclick="startScan()">

          <!-- 隱私權政策 -->
          <img class="privacy-button" src="./assets/images/privacy.svg" alt="event" onclick="window.location.href='privacy.html'">
        </div>
        <div class="footer-line"> </div>
      </div>

      <div class="cloud-bg">
        <img class="cloud-1" src="./assets/images/cloud-1.png" alt="cloud">
        <img class="cloud-2" src="./assets/images/cloud-2.png" alt="cloud">
        <img class="cloud-3" src="./assets/images/cloud-3.png" alt="cloud">
      </div>

    </div>

    <!-- 印章收集彈窗 -->
    <div class="popup-overlay" id="stampCollectedPopup">
      <div class="popup-content stamp-popup">
        <h2 class="popup-title" style="margin-bottom: 0;" id="stampPopupTitle">獲得新印章</h2>
        <div class="stamp-icon">
          <img id="collectedStampImage" src="" alt="collected stamp">
        </div>
        <h3 class="stamp-subtitle" id="stampSubtitle"></h3>
        <button class="popup-button stamp-ok-button" onclick="backToEventList()">返回集章卡</button>
      </div>
    </div>

    <!-- 全齡教育尋寶圖（Google 表單） -->
    <div class="popup-overlay" id="treasureFormPopup">
      <div class="popup-content form-popup">
        <div class="form-popup-header">
          <h2 class="form-popup-title">全齡教育尋寶圖</h2>
          <button class="form-popup-close" onclick="closePopup()" aria-label="關閉">×</button>
        </div>
        <!-- src 於開啟時才填入，避免每次進入本頁都去載入表單 -->
        <iframe
          class="form-popup-frame"
          id="treasureFormFrame"
          data-src="https://docs.google.com/forms/d/e/1FAIpQLSdqzPXMKo7CFqQX8lKK00JktSgW-6HlEt-2g2PwMhUbSypQkg/viewform?embedded=true"
          title="全齡教育尋寶圖">載入中…</iframe>
      </div>
    </div>

    <script src="./assets/js/app.js"></script>
    <script src="./assets/js/event-detail.js"></script>
    <script>
      // 本頁關卡編號；其餘邏輯共用 event-detail.js
      initEventDetail(4);

      // 開啟尋寶圖表單；第一次開啟才真正載入 iframe
      function openTreasureForm() {
        var frame = document.getElementById('treasureFormFrame');
        if (frame && !frame.src) {
          frame.src = frame.getAttribute('data-src');
        }

        Popup.show('treasureFormPopup');
      }
    </script>

  </body>
</html>

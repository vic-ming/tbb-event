# 部署到主機的 ~/nginx/conf.d/ccu-healthyage.conf
# （容器內路徑 /etc/nginx/conf.d/ccu-healthyage.conf）
#
# 改動重點：原本只服務一個空白佔位頁，現在加上
#   1. 活動靜態網站（根目錄）
#   2. /api/ 反向代理到 tbb-api 容器
#   3. /scan/N 導回關卡內頁（使用者用原生相機掃 QR 會直接開這個網址）

server {
    listen 80;
    server_name ccu-healthyage.com www.ccu-healthyage.com;

    # 憑證續期用，必須維持在 HTTP
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name ccu-healthyage.com www.ccu-healthyage.com;

    ssl_certificate     /etc/letsencrypt/live/ccu-healthyage.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ccu-healthyage.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /usr/share/nginx/html;
    index index.html;

    # 相機需要 HTTPS 才能使用；順便關掉不需要的權限
    add_header Permissions-Policy "camera=(self), microphone=(), geolocation=()" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "same-origin" always;

    gzip on;
    gzip_types text/css application/javascript image/svg+xml application/json;
    gzip_min_length 1024;

    # ---------- API ----------
    location /api/ {
        # 用變數 + Docker 內建 DNS，讓名稱在「請求當下」才解析：
        # API 容器沒起來時 nginx 仍能正常啟動與 reload，不會拖垮整個站台
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $tbb_api http://tbb-api:3000;
        proxy_pass $tbb_api$request_uri;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        # 後端的限流以此判斷來源 IP
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_read_timeout    15s;

        # 統計數字不得被任何一層快取
        add_header Cache-Control "no-store" always;
    }

    # ---------- 攤位 QR code ----------
    # QR 內容是 https://ccu-healthyage.com/scan/N
    # 用 app 內建掃描器可直接解析；用手機原生相機掃會開啟這個網址，導回該關內頁
    location ~ ^/scan/([1-4])/?$ {
        return 302 /event-$1.html;
    }

    # ---------- 靜態網站 ----------
    # 圖片與 CSS/JS 可長期快取（改版時檔名或內容會變）
    location ~* \.(png|jpg|jpeg|svg|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # HTML 與 JS 不快取，避免活動期間改了內容但使用者拿到舊版
    location ~* \.(html|js)$ {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    location / {
        try_files $uri $uri/ =404;
    }
}

<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- <link rel="icon" href="./assets/favicon.ico"> -->
    <title>Event</title>
    <!-- 字體 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@100..900&display=swap" rel="stylesheet">

    <!-- 共用樣式 -->
    <link rel="stylesheet" href="./assets/css/style.css">

    <!-- 本頁樣式 -->
    <style>
      /* 題目較長，內容靠上並可捲動 */
      .survey-main{
        justify-content: flex-start;
        overflow-y: auto;
      }

      .survey-title{
        font-size: 32px;
        font-weight: 700;
        text-align: center;
        color: #527ACC;
      }

      .survey-intro{
        color: #666;
        font-size: 20px;
        text-align: left;
        line-height: 1.6;
      }

      .survey-list{
        display: flex;
        flex-direction: column;
        gap: 24px;
        width: 100%;
      }

      .survey-item{
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .survey-question{
        display: flex;
        align-items: flex-start;
        gap: 6px;
        color: #666;
        font-size: 20px;
        line-height: 1.5;
      }

      .survey-number{
        font-weight: 700;
        color: #666;
      }

      .survey-angle{
        width: 10px;
        margin-top: 10px;
      }

      .survey-question-text{
        flex: 1;
      }

      .survey-options{
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 8px;
        padding-left: 30px;
      }

      .survey-option{
        padding: 8px 12px;
        font-family: inherit;
        font-size: 18px;
        color: #527ACC;
        background-color: #FFFFFF;
        border: 2px solid #527ACC;
        border-radius: 20px;
        cursor: pointer;
        transition: background-color 0.2s ease, color 0.2s ease;
      }

      .survey-option.selected{
        color: #FFFFFF;
        background-color: #527ACC;
      }

      .survey-textarea{
        width: calc(100% - 30px);
        padding: 8px 12px;
        font-family: inherit;
        font-size: 18px;
        color: #333333;
        background-color: #FFFFFF;
        border: 2px solid #527ACC;
        border-radius: 8px;
        outline: none;
        resize: vertical;
        box-sizing: border-box;
        margin-left: 30px;
      }

      .survey-error{
        color: #DA3700;
        font-size: 14px;
        text-align: center;
      }

      .survey-submit{
        width: 240px;
        margin: 8px auto 24px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- header -->
      <div class="header">
        <img class="logo-1" src="./assets/images/logo-1.png" alt="logo">
        <img class="logo-2" src="./assets/images/logo-2.png" alt="logo">
      </div>

      <!-- content -->
      <main class="main page-main survey-main" id="mainContent">
        <div class="survey-title">滿意度調查問卷</div>
        <div class="survey-intro">
          感謝您參觀教育部主題館，為提升我們的服務品質，懇請您撥冗填寫本問卷，您的意見將作為未來改進的重要參考。
        </div>

        <!-- 題目由 surveyQuestions 動態產生 -->
        <div class="survey-list" id="surveyList"></div>

        <p class="survey-error" id="surveyError" style="display: none;">尚有題目未作答，請完成後再送出</p>

        <button class="common-button survey-submit" id="surveySubmit" onclick="submitSurvey()">送出</button>
      </main>

      <!-- footer -->
      <div class="footer">
        <div class="footer-line"> </div>
      </div>

    </div>

    <script src="./assets/js/app.js"></script>
    <!-- 題目定義與 stats.html 匯出共用同一份 -->
    <script src="./assets/js/survey-questions.js"></script>
    <script>
      // 作答結果
      const answers = {};

      // 產生題目畫面
      function renderQuestions() {
        const list = document.getElementById('surveyList');
        if (!list) return;

        surveyQuestions.forEach((question, index) => {
          const item = document.createElement('div');
          item.className = 'survey-item';

          const title = document.createElement('div');
          title.className = 'survey-question';
          title.innerHTML = `<span class="survey-number">${index + 1}</span>
            <img class="survey-angle" src="./assets/images/angle.svg" alt="angle">
            <span class="survey-question-text">${question.text}</span>`;
          item.appendChild(title);

          if (question.type === 'text') {
            item.appendChild(createTextInput(question));
          } else {
            item.appendChild(createOptions(question));
          }

          list.appendChild(item);
        });
      }

      // 產生選項按鈕（單選 / 複選）
      function createOptions(question) {
        const optionBox = document.createElement('div');
        optionBox.className = 'survey-options';
        const isMultiple = question.type === 'multiple';

        if (isMultiple) {
          answers[question.id] = [];
        }

        question.options.forEach(option => {
          const button = document.createElement('button');
          button.className = 'survey-option';
          button.type = 'button';
          button.textContent = option;
          button.onclick = () => {
            if (isMultiple) {
              toggleOption(question.id, option, button);
            } else {
              selectOption(question.id, option, optionBox, button);
            }
          };
          optionBox.appendChild(button);
        });

        return optionBox;
      }

      // 產生文字填答欄位
      function createTextInput(question) {
        const textarea = document.createElement('textarea');
        textarea.className = 'survey-textarea';
        textarea.rows = 3;
        textarea.placeholder = question.placeholder || '';
        textarea.oninput = () => {
          answers[question.id] = textarea.value.trim();
          hideError();
        };

        return textarea;
      }

      // 單選
      function selectOption(questionId, option, optionBox, button) {
        answers[questionId] = option;

        // 同一題僅能單選
        optionBox.querySelectorAll('.survey-option').forEach(item => {
          item.classList.remove('selected');
        });
        button.classList.add('selected');

        hideError();
      }

      // 複選
      function toggleOption(questionId, option, button) {
        const selected = answers[questionId];
        const index = selected.indexOf(option);

        if (index === -1) {
          selected.push(option);
          button.classList.add('selected');
        } else {
          selected.splice(index, 1);
          button.classList.remove('selected');
        }

        hideError();
      }

      // 有作答就先收起錯誤提示
      function hideError() {
        const error = document.getElementById('surveyError');
        if (error) error.style.display = 'none';
      }

      function showError(message) {
        const error = document.getElementById('surveyError');
        if (!error) return;

        error.textContent = message;
        error.style.display = 'block';
      }

      // 該題是否已作答
      function isAnswered(question) {
        const answer = answers[question.id];

        if (question.type === 'multiple') {
          return Array.isArray(answer) && answer.length > 0;
        }
        return typeof answer === 'string' && answer !== '';
      }

      // 送出問卷
      function submitSurvey() {
        // 非必填題目不列入檢查
        const unanswered = surveyQuestions.filter(question => {
          return question.required !== false && !isAnswered(question);
        });

        if (unanswered.length > 0) {
          showError('尚有題目未作答，請完成後再送出');

          // 捲動到第一題未作答的題目
          const firstIndex = surveyQuestions.indexOf(unanswered[0]);
          const items = document.querySelectorAll('.survey-item');
          if (items[firstIndex]) {
            items[firstIndex].scrollIntoView({ behavior: 'smooth', block: 'center' });
          }
          return;
        }

        const button = document.getElementById('surveySubmit');
        if (button) button.disabled = true;

        sendAnswers(answers)
          .then(() => {
            Progress.setSurveyDone(answers);

            // 回主畫面並帶出「前往服務臺」彈窗
            window.location.href = 'event-list.html?survey=done';
          })
          .catch(() => {
            showError('送出失敗，請稍後再試');
            if (button) button.disabled = false;
          });
      }

      // 回傳作答內容到後端
      function sendAnswers(payload) {
        return fetch(SURVEY_ENDPOINT, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            device: Analytics.deviceId(),
            answers: payload
          })
        })
          .then(response => response.json())
          .then(data => {
            if (!data.ok) throw new Error(data.error || 'survey submit failed');
          });
      }

      document.addEventListener('DOMContentLoaded', renderQuestions);
    </script>
  </body>
</html>
